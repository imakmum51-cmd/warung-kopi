<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <!-- Background rounded square (cream) -->
  <rect width="192" height="192" rx="38" fill="#f0e6d2"/>

  <!-- Outer brown ring -->
  <circle cx="96" cy="96" r="78" fill="none" stroke="#3e2618" stroke-width="3.5"/>

  <!-- Inner thin ring with dotted stars -->
  <circle cx="96" cy="96" r="70" fill="none" stroke="#3e2618" stroke-width="1.2"/>
  <g fill="#3e2618">
    <circle cx="96" cy="26" r="1.4"/>
    <circle cx="166" cy="96" r="1.4"/>
    <circle cx="96" cy="166" r="1.4"/>
    <circle cx="26" cy="96" r="1.4"/>
    <circle cx="146" cy="46" r="1.1"/>
    <circle cx="146" cy="146" r="1.1"/>
    <circle cx="46" cy="146" r="1.1"/>
    <circle cx="46" cy="46" r="1.1"/>
  </g>

  <!-- Inner cream circle (clean face) -->
  <circle cx="96" cy="96" r="62" fill="#f7efdc"/>

  <!-- Sun rays (8 triangular spokes) -->
  <g fill="#c2502a">
    <polygon points="96,40 91,70 101,70"/>
    <polygon points="96,152 91,122 101,122"/>
    <polygon points="40,96 70,91 70,101"/>
    <polygon points="152,96 122,91 122,101"/>
    <polygon points="56,56 82,78 78,82"/>
    <polygon points="136,56 110,78 114,82"/>
    <polygon points="56,136 82,114 78,110"/>
    <polygon points="136,136 110,114 114,110"/>
  </g>

  <!-- Navy moon (left, overlapping) -->
  <circle cx="83" cy="96" r="22" fill="#1e2f50"/>
  <!-- Stars on moon -->
  <g fill="#fde68a">
    <circle cx="88" cy="88" r="1.2"/>
    <circle cx="76" cy="96" r="0.9"/>
    <circle cx="85" cy="104" r="1.1"/>
    <circle cx="80" cy="90" r="0.7"/>
  </g>

  <!-- Orange sun (right, overlapping moon) -->
  <circle cx="104" cy="96" r="19" fill="#c2502a"/>
  <!-- Dashed inner ring on sun -->
  <circle cx="104" cy="96" r="14" fill="none" stroke="#f7efdc" stroke-width="0.8" stroke-dasharray="2.5,2"/>
</svg>
