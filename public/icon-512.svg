<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Background rounded square (cream) -->
  <rect width="512" height="512" rx="100" fill="#f0e6d2"/>

  <!-- Outer brown ring -->
  <circle cx="256" cy="256" r="208" fill="none" stroke="#3e2618" stroke-width="9"/>

  <!-- Inner thin ring with dotted stars -->
  <circle cx="256" cy="256" r="187" fill="none" stroke="#3e2618" stroke-width="3"/>
  <g fill="#3e2618">
    <circle cx="256" cy="69" r="3.8"/>
    <circle cx="443" cy="256" r="3.8"/>
    <circle cx="256" cy="443" r="3.8"/>
    <circle cx="69" cy="256" r="3.8"/>
    <circle cx="389" cy="123" r="3"/>
    <circle cx="389" cy="389" r="3"/>
    <circle cx="123" cy="389" r="3"/>
    <circle cx="123" cy="123" r="3"/>
  </g>

  <!-- Inner cream circle (clean face) -->
  <circle cx="256" cy="256" r="166" fill="#f7efdc"/>

  <!-- Sun rays (8 triangular spokes) -->
  <g fill="#c2502a">
    <polygon points="256,107 242,187 270,187"/>
    <polygon points="256,405 242,325 270,325"/>
    <polygon points="107,256 187,242 187,270"/>
    <polygon points="405,256 325,242 325,270"/>
    <polygon points="150,150 219,208 208,219"/>
    <polygon points="362,150 293,208 304,219"/>
    <polygon points="150,362 219,304 208,293"/>
    <polygon points="362,362 293,304 304,293"/>
  </g>

  <!-- Navy moon (left, overlapping) -->
  <circle cx="221" cy="256" r="59" fill="#1e2f50"/>
  <!-- Stars on moon -->
  <g fill="#fde68a">
    <circle cx="234" cy="235" r="3.2"/>
    <circle cx="203" cy="256" r="2.4"/>
    <circle cx="226" cy="277" r="2.9"/>
    <circle cx="213" cy="240" r="1.9"/>
  </g>

  <!-- Orange sun (right, overlapping moon) -->
  <circle cx="277" cy="256" r="51" fill="#c2502a"/>
  <!-- Dashed inner ring on sun -->
  <circle cx="277" cy="256" r="37" fill="none" stroke="#f7efdc" stroke-width="2" stroke-dasharray="6.5,5"/>
</svg>
